trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - terraform/**
      - "*.md"

pr:
  branches:
    include:
      - main

variables:
  imageRepository: "mediflow"
  containerRegistry: "acr-mediflow"
  acrLoginServer: "acrmediflowdev.azurecr.io"
  dockerfilePath: "Dockerfile"
  tag: "$(Build.BuildId)"
  kubernetesServiceConnection: "aks-mediflow"
  namespace: "mediflow"
  helmReleaseName: "mediflow"
  helmChartPath: "helm/mediflow"

pool: Default

stages:
  - stage: Test
    displayName: "Run tests"
    jobs:
      - job: Pytest
        displayName: "pytest"
        steps:
          - script: |
              python3 -m pip install -r requirements.txt
              python3 -m pytest tests/ -v --tb=short
            displayName: "Install dependencies and run pytest"

  - stage: Build
    displayName: "Build and push image"
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BuildPush
        displayName: "Docker build and push to ACR"
        steps:
          - task: Docker@2
            displayName: "Login to ACR"
            inputs:
              command: login
              containerRegistry: $(containerRegistry)

          - script: |
              docker buildx create --use --name multiarch 2>/dev/null || docker buildx use multiarch
              docker buildx build \
                --platform linux/amd64,linux/arm64 \
                --tag $(acrLoginServer)/$(imageRepository):$(tag) \
                --tag $(acrLoginServer)/$(imageRepository):latest \
                --push .
            displayName: "Build multi-arch and push to ACR"

  - stage: Deploy
    displayName: "Deploy to AKS"
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: HelmDeploy
        displayName: "Helm upgrade on AKS"
        environment: "dev"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: HelmDeploy@1
                  displayName: "Helm upgrade mediflow"
                  inputs:
                    connectionType: "Kubernetes Service Connection"
                    kubernetesServiceConnection: $(kubernetesServiceConnection)
                    namespace: $(namespace)
                    command: upgrade
                    chartType: filepath
                    chartPath: $(helmChartPath)
                    releaseName: $(helmReleaseName)
                    overrideValues: "image.repository=$(acrLoginServer)/$(imageRepository),image.tag=$(tag)"
                    install: true
                    waitForExecution: true
                    arguments: "--create-namespace"
